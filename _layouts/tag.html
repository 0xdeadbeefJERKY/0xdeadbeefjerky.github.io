---
layout: default
---

<div class="container">
  <div class="content-wrapper">
    <h1 class="taxonomy-title">Tag: {{ page.title }}</h1>
    <ul class="blog-list">
      {% for post in page.posts %}
      <li class="blog-item">
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %d, %Y" }}</time>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
