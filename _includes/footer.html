<footer class="site-footer">
  <div class="container">
    <div class="footer-social">
      {% for entry in site.data.contact %}
        {% if entry.type == 'github' %}
          <a href="https://github.com/{{ site.github.username }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="{{ entry.icon }}" aria-hidden="true"></i></a>
        {% elsif entry.type == 'twitter' or entry.type == 'x' %}
          <a href="https://x.com/{{ site.twitter.username }}" target="_blank" rel="noopener" aria-label="X (Twitter)"><i class="{{ entry.icon }}" aria-hidden="true"></i></a>
        {% elsif entry.type == 'email' %}
          <a href="mailto:{{ site.social.email }}" aria-label="Email"><i class="{{ entry.icon }}" aria-hidden="true"></i></a>
        {% elsif entry.type == 'rss' %}
          <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS"><i class="{{ entry.icon }}" aria-hidden="true"></i></a>
        {% endif %}
      {% endfor %}
    </div>
    <div class="footer-copy">
      &copy; {{ site.time | date: '%Y' }} <a href="{{ '/' | relative_url }}">{{ site.social.name }}</a>
    </div>
  </div>
</footer>
