<nav class="site-nav">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-brand">
      {% if site.avatar %}<img src="{{ site.avatar | relative_url }}" alt="avatar" class="site-avatar">{% endif %}
      <span>0xdeadbeefJERKY</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      {% assign sorted_tabs = site.tabs | sort: 'order' %}
      {% for tab in sorted_tabs %}
        <a href="{{ tab.url | relative_url }}" {% if page.url == tab.url %}class="active"{% endif %}>{{ tab.title | capitalize }}</a>
      {% endfor %}
    </div>
  </div>
</nav>
