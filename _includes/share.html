{% if site.data.share.platforms %}
<div class="post-share">
  <span class="label">Share:</span>
  {% assign full_url = page.url | prepend: site.url %}
  {% for platform in site.data.share.platforms %}
    {% assign share_url = platform.link | replace: 'URL', full_url | replace: 'TITLE', page.title %}
    <a href="{{ share_url }}" target="_blank" rel="noopener" aria-label="Share on {{ platform.type }}">
      <i class="{{ platform.icon }}"></i>
    </a>
  {% endfor %}
</div>
{% endif %}
